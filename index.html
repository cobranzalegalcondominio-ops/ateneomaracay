<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ateneo de Maracay</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js"></script>
</head>
<body>

    <div id="contenido-dinamico">Cargando información del Ateneo...</div>

    <script>
        fetch('content/inicio.md')
            .then(response => response.text())
            .then(markdown => {
                const converter = new showdown.Converter();
                document.getElementById('contenido-dinamico').innerHTML = converter.makeHtml(markdown);
            })
            .catch(err => {
                document.getElementById('contenido-dinamico').innerHTML = "Error al cargar contenido.";
                console.error(err);
            });
    </script>
</body>
</html>
