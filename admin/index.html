<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ateneo de Maracay — Administrador de Contenido</title>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@latest/dist/decap-cms.js"></script>
    
    <script>
      // Forzamos la configuración para ignorar Netlify y usar GitHub directamente
      window.CMS_MANUAL_INIT = true;
      
      CMS.init({
        config: {
          backend: {
            name: "github",
            repo: "cobranzalegalcondominio-ops/ateneomaracay",
            branch: "main",
            auth_type: "pkce",
            app_id: "Iv23liV7ZhnKuWXd8WT" // Asegúrate que este sea tu Client ID de GitHub
          },
          media_folder: "assets/img",
          public_folder: "/assets/img",
          collections: [
            {
              name: "paginas",
              label: "Páginas",
              files: [
                {
                  label: "Página de Inicio",
                  name: "inicio",
                  file: "content/inicio.md",
                  fields: [
                    { label: "Título", name: "titulo", widget: "string" },
                    { label: "Contenido", name: "contenido", widget: "markdown" }
                  ]
                }
              ]
            }
            // Puedes añadir el resto de tus colecciones aquí o dejar que el config.yml las cargue
          ]
        }
      });
    </script>
  </body>
</html>
