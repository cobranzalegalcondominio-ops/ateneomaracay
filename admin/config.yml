backend:
  name: git-gateway
  branch: main # Asegúrate de que tu rama principal sea main

media_folder: "assets/images" # Carpeta donde se guardarán las fotos de los eventos
public_folder: "assets/images"

collections:
  - name: "eventos"
    label: "Eventos"
    folder: "eventos" # Carpeta donde guardarás los archivos .md de cada evento
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Fecha", name: "date", widget: "datetime"}
      - {label: "Imagen", name: "image", widget: "image"}
      - {label: "Descripción", name: "body", widget: "markdown"}
