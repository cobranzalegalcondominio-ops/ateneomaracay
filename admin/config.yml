backend:
  name: github
  repo: cobranzalegalcondominio-ops/ateneomaracay
  branch: main
  auth_type: implicit
  app_id: 0v23liV7ZhnKuWXdb8WT

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "paginas"
    label: "Páginas"
    files:
      - name: "inicio"
        label: "Página de Inicio"
        file: "content/inicio.md"
        fields:
          - { label: "Título", name: "titulo", widget: "string" }
          - { label: "Contenido", name: "contenido", widget: "markdown" }

      - name: "historia"
        label: "Historia"
        file: "content/historia.md"
        fields:
          - { label: "Título", name: "titulo", widget: "string" }
          - { label: "Contenido", name: "contenido", widget: "markdown" }

  - name: "eventos"
    label: "Eventos"
    folder: "content/eventos"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "titulo", widget: "string" }
      - { label: "Fecha", name: "fecha", widget: "datetime" }
      - { label: "Descripción", name: "descripcion", widget: "markdown" }
      - { label: "Imagen", name: "imagen", widget: "image" }

  - name: "noticias"
    label: "Noticias"
    folder: "content/noticias"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "titulo", widget: "string" }
      - { label: "Fecha", name: "fecha", widget: "datetime" }
      - { label: "Contenido", name: "contenido", widget: "markdown" }
      - { label: "Imagen", name: "imagen", widget: "image" }

  - name: "galeria"
    label: "Galería"
    folder: "content/galeria"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "titulo", widget: "string" }
      - { label: "Imagen", name: "imagen", widget: "image" }

